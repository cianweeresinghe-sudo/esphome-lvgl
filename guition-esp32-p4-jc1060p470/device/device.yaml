# =========================================================
# guition-esp32-p4-jc1060p470 DEVICE CONFIG
# Stable NON-BLOCKING brightness logic
# =========================================================

esp32:
  variant: esp32p4
  flash_size: 16MB
  cpu_frequency: 360MHZ
  framework:
    type: esp-idf
    advanced:
      enable_idf_experimental_features: true
    sdkconfig_options:
      CONFIG_SPIRAM_XIP_FROM_PSRAM: "y"
      CONFIG_SDMMC_HOST_DEFAULT: "y"

# ---------------------------------------------------------
# ESPHome
# ---------------------------------------------------------
esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  area: ${room}

# ---------------------------------------------------------
# External components
# ---------------------------------------------------------
external_components:
  - source: github://p1ngb4ck/esphome@dev
    components:
      [audio, binary_storage, http_file_browser, nfs_client,
       picture_viewer, uart, usb_host, usb_uart, usb_storage,
       sd_storage, smb_client, storage, transcoder,
       video_player, webdav_server]
    refresh: 0s

# ---------------------------------------------------------
# Connectivity
# ---------------------------------------------------------
esp32_hosted:
  variant: esp32c6
  reset_pin: GPIO54
  cmd_pin: GPIO19
  clk_pin: GPIO18
  d0_pin: GPIO14
  d1_pin: GPIO15
  d2_pin: GPIO16
  d3_pin: GPIO17
  active_high: true

psram:
  mode: hex
  speed: 200MHz

ota:
  platform: esphome

api:
logger:

# ---------------------------------------------------------
# Power
# ---------------------------------------------------------
esp_ldo:
  - channel: 3
    id: dsi_phy_enable
    voltage: 2.5V
  - channel: 4
    id: sd_card_power
    voltage: 2.7V

# ---------------------------------------------------------
# BACKLIGHT
# ---------------------------------------------------------
output:
  - platform: ledc
    pin: GPIO23
    id: gpio_backlight_pwm

light:
  - platform: monochromatic
    id: display_backlight
    name: Display Backlight
    output: gpio_backlight_pwm
    restore_mode: ALWAYS_ON
    gamma_correct: 1.0
    default_transition_length: 0s

# ---------------------------------------------------------
# GLOBAL STATE (NO DELAYS)
# ---------------------------------------------------------
globals:
  - id: screen_awake_until
    type: uint32_t
    restore_value: no
    initial_value: '0'

# ---------------------------------------------------------
# TOUCH WAKE
# ---------------------------------------------------------
script:
  - id: screen_wake
    then:
      - lambda: |-
          id(screen_awake_until) = millis() + 300000; // 5 minutes

      - light.turn_on:
          id: display_backlight
          brightness: 100%
          transition_length: 0s

# ---------------------------------------------------------
# SMART BRIGHTNESS ENGINE
# runs every 10s — ZERO blocking
# ---------------------------------------------------------
interval:
  - interval: 10s
    then:
      - lambda: |-
          auto now = id(sntp_time).now();
          if (!now.is_valid()) return;

          bool night = (now.hour >= 23 || now.hour < 6);
          bool awake = millis() < id(screen_awake_until);

          auto call = id(display_backlight).make_call();

          if (night && !awake) {
            call.set_state(false);        // OFF overnight
          }
          else if (awake) {
            call.set_state(true);
            call.set_brightness(1.0f);    // 100% after touch
          }
          else {
            call.set_state(true);
            call.set_brightness(0.25f);   // 25% idle
          }

          call.perform();

# ---------------------------------------------------------
# TOUCHSCREEN
# ---------------------------------------------------------
i2c:
  - id: bus_a
    sda: GPIO07
    scl: GPIO08
    frequency: 400kHz

i2c_device:
  - id: i2cdev1
    address: 0x18
  - id: i2cdev2
    address: 0x32
  - id: i2cdev3
    address: 0x36
  - id: i2cdev4
    address: 0x40

touchscreen:
  - platform: gt911
    id: my_touchscreen
    i2c_id: bus_a
    reset_pin: GPIO22
    interrupt_pin: GPIO21
    on_touch:
      then:
        - script.execute: screen_wake

# ---------------------------------------------------------
# DISPLAY
# ---------------------------------------------------------
display:
  - platform: mipi_dsi
    id: my_display
    model: JC1060P470
    color_order: RGB
    reset_pin:
      number: GPIO05
    rotation: 0
    update_interval: never
    auto_clear_enabled: false
    hsync_pulse_width: 20
