lvgl:
  displays: my_display
  byte_order: little_endian

##################################################
# TOP BAR
##################################################

  top_layer:
    widgets:

      - label:
          id: temperatures
          text: "--° / --°"
          align: top_left
          x: 10
          y: 8

      - label:
          id: display_time
          text: "--:--"
          align: top_mid
          y: 8


##################################################
# DASHBOARD PAGE
##################################################

  pages:
    - id: dashboard_page
      layout:
        type: flex
        flex_flow: row_wrap
        pad_row: 14
        pad_column: 14
      width: 100%
      bg_color: black
      pad_top: 40

      widgets:

        - obj:
            width: 160
            height: 90
            bg_color: 0x1E1E1E
            radius: 10
            pad_all: 10
            widgets:
              - label: { text: "Solar" }
              - label:
                  id: solar_value
                  align: bottom_left
                  text: "--"

        - obj:
            width: 160
            height: 90
            bg_color: 0x1E1E1E
            radius: 10
            pad_all: 10
            widgets:
              - label: { text: "Usage" }
              - label:
                  id: usage_value
                  align: bottom_left
                  text: "--"

        - obj:
            width: 160
            height: 90
            bg_color: 0x1E1E1E
            radius: 10
            pad_all: 10
            widgets:
              - label: { text: "Car Battery" }
              - label:
                  id: car_value
                  align: bottom_left
                  text: "--"

        - obj:
            width: 160
            height: 90
            bg_color: 0x1E1E1E
            radius: 10
            pad_all: 10
            widgets:
              - label: { text: "Rain" }
              - label:
                  id: rain_value
                  align: bottom_left
                  text: "--"

        - obj:
            width: 160
            height: 90
            bg_color: 0x1E1E1E
            radius: 10
            pad_all: 10
            widgets:
              - label: { text: "Weather" }
              - label:
                  id: weather_value
                  align: bottom_left
                  text: "--"
