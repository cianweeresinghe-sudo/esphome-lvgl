lvgl:
  displays: my_display
  byte_order: little_endian

  #################################################
  # TOP HEADER
  #################################################
  top_layer:
    widgets:

      - label:
          id: temperatures
          text: "-° / -°"
          text_font: clockbar_font
          align: top_left
          x: 8
          y: 8
          text_color: 0xFFFFFF

      - label:
          id: display_time
          text: "--:--"
          text_font: clockbar_font
          align: top_mid
          y: 8
          text_align: center
          text_color: 0xFFFFFF

      #################################################
      # CONTROL OVERLAY (MODAL)
      #################################################
      - obj:
          id: control_overlay
          width: 100%
          height: 100%
          hidden: true
          clickable: true
          bg_color: 0x000000
          bg_opa: 180

          layout:
            type: flex
            flex_flow: column
            flex_align_main: center
            flex_align_cross: center

          widgets:

            #################################################
            # LIVING THERM PANEL
            #################################################
            - obj:
                id: living_panel
                hidden: true
                layout:
                  type: flex
                  flex_flow: column
                  flex_align_main: center
                  flex_align_cross: center
                widgets:

                  - label:
                      text: "Living"
                      text_font: label_font

                  - label:
                      id: living_overlay_temp
                      text: "--.-°C"
                      text_font: statistics_font

                  - obj:
                      layout:
                        type: flex
                        flex_flow: row
                        pad_column: 40
                      widgets:

                        - button:
                            width: 100
                            height: 100
                            widgets:
                              - label: { text: "-" }
                            on_click:
                              - homeassistant.service:
                                  service: climate.set_temperature
                                  data:
                                    entity_id: climate.smart_radiator_thermostat_x
                                    temperature: !lambda |-
                                      return id(living_target_temp).state - 0.5;

                        - button:
                            width: 100
                            height: 100
                            widgets:
                              - label: { text: "+" }
                            on_click:
                              - homeassistant.service:
                                  service: climate.set_temperature
                                  data:
                                    entity_id: climate.smart_radiator_thermostat_x
                                    temperature: !lambda |-
                                      return id(living_target_temp).state + 0.5;

            #################################################
            # HOUSE THERM PANEL
            #################################################
            - obj:
                id: house_panel
                hidden: true
                layout:
                  type: flex
                  flex_flow: column
                  flex_align_main: center
                  flex_align_cross: center
                widgets:

                  - label:
                      text: "House"
                      text_font: label_font

                  - label:
                      id: house_overlay_temp
                      text: "--.-°C"
                      text_font: statistics_font

                  - obj:
                      layout:
                        type: flex
                        flex_flow: row
                        pad_column: 40
                      widgets:

                        - button:
                            width: 100
                            height: 100
                            widgets:
                              - label: { text: "-" }
                            on_click:
                              - homeassistant.service:
                                  service: climate.set_temperature
                                  data:
                                    entity_id: climate.wireless_temperature_sensor_x
                                    temperature: !lambda |-
                                      return id(house_target_temp).state - 0.5;

                        - button:
                            width: 100
                            height: 100
                            widgets:
                              - label: { text: "+" }
                            on_click:
                              - homeassistant.service:
                                  service: climate.set_temperature
                                  data:
                                    entity_id: climate.wireless_temperature_sensor_x
                                    temperature: !lambda |-
                                      return id(house_target_temp).state + 0.5;

            #################################################
            # SONOS PANEL
            #################################################
            - obj:
                id: sonos_panel
                hidden: true
                layout:
                  type: flex
                  flex_flow: column
                  flex_align_main: center
                  flex_align_cross: center
                widgets:

                  - label:
                      text: "Kitchen Sonos"
                      text_font: label_font

                  - label:
                      id: sonos_volume_label
                      text: "--%"
                      text_font: statistics_font

                  - obj:
                      layout:
                        type: flex
                        flex_flow: row
                        pad_column: 40
                      widgets:

                        - button:
                            width: 100
                            height: 100
                            widgets:
                              - label: { text: "-" }
                            on_click:
                              - homeassistant.service:
                                  service: media_player.volume_down
                                  data:
                                    entity_id: media_player.kitchen

                        - button:
                            width: 100
                            height: 100
                            widgets:
                              - label: { text: "+" }
                            on_click:
                              - homeassistant.service:
                                  service: media_player.volume_up
                                  data:
                                    entity_id: media_player.kitchen

            #################################################
            # CLOSE BUTTON
            #################################################
            - button:
                width: 200
                height: 70
                widgets:
                  - label: { text: "Close" }
                on_click:
                  - lvgl.widget.update:
                      id: control_overlay
                      hidden: true

  #################################################
  # MAIN PAGE
  #################################################
  pages:
    - id: main_page
      layout:
        type: flex
        flex_flow: column_wrap
        pad_row: 10
        pad_column: 10

      width: 100%
      pad_top: 42

      widgets:

        #################################################
        # LIVING THERM TILE (OPENS OVERLAY)
        #################################################
        - button:
            width: 210
            height: 120
            styles: control
            widgets:
              - label: { text: "Living", align: bottom_left }
              - label:
                  id: living_target_label
                  text: "--.-°C"
                  align: center
            on_click:
              - lvgl.widget.update: { id: control_overlay, hidden: false }
              - lvgl.widget.update: { id: living_panel, hidden: false }
              - lvgl.widget.update: { id: house_panel, hidden: true }
              - lvgl.widget.update: { id: sonos_panel, hidden: true }

        #################################################
        # HOUSE THERM TILE
        #################################################
        - button:
            width: 210
            height: 120
            styles: control
            widgets:
              - label: { text: "House", align: bottom_left }
              - label:
                  id: house_target_label
                  text: "--.-°C"
                  align: center
            on_click:
              - lvgl.widget.update: { id: control_overlay, hidden: false }
              - lvgl.widget.update: { id: living_panel, hidden: true }
              - lvgl.widget.update: { id: house_panel, hidden: false }
              - lvgl.widget.update: { id: sonos_panel, hidden: true }
