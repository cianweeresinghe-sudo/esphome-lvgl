lvgl:
  displays: my_display
  byte_order: little_endian

  pages:
    - id: main_page
      bg_color: black
      layout:
        type: flex
        flex_flow: row_wrap
        pad_row: 15
        pad_column: 15
        pad_all: 20

      widgets:

        - button:
            id: kitchen_btn
            width: 220
            height: 140
            checkable: true
            widgets:
              - label:
                  text: "Kitchen"
                  align: center
            on_click:
              - homeassistant.service:
                  service: light.toggle
                  data:
                    entity_id: light.kitchen

        - button:
            id: living_btn
            width: 220
            height: 140
            checkable: true
            widgets:
              - label:
                  text: "Living Room"
                  align: center
            on_click:
              - homeassistant.service:
                  service: light.toggle
                  data:
                    entity_id: light.living_room

        - button:
            id: hall_btn
            width: 220
            height: 140
            checkable: true
            widgets:
              - label:
                  text: "Hall"
                  align: center
            on_click:
              - homeassistant.service:
                  service: light.toggle
                  data:
                    entity_id: light.hall

        - button:
            id: downstairs_btn
            width: 220
            height: 140
            checkable: true
            widgets:
              - label:
                  text: "Downstairs"
                  align: center
            on_click:
              - homeassistant.service:
                  service: light.toggle
                  data:
                    entity_id: light.downstairs

        - button:
            id: garden_btn
            width: 220
            height: 140
            checkable: true
            widgets:
              - label:
                  text: "Garden"
                  align: center
            on_click:
              - homeassistant.service:
                  service: light.toggle
                  data:
                    entity_id: light.garden_lights
