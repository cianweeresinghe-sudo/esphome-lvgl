lvgl:
  displays: my_display
  byte_order: little_endian

  top_layer:
    widgets:
      # Temperature header
      - label:
          text: "-° / -°"
          id: temperatures
          text_font: clockbar_font
          align: top_left
          x: 8
          y: 8
          text_color: 0xFFFFFF

      # Clock header (updated by addon/time.yaml)
      - label:
          text: "--:--"
          id: display_time
          text_font: clockbar_font
          align: top_mid
          x: 0
          y: 8
          text_align: center
          text_color: 0xFFFFFF

  pages:
    - id: main_page
      layout:
        type: flex
        flex_flow: column_wrap
        pad_row: 10
        pad_column: 10
      width: 100%
      bg_color: Black
      bg_opa: cover
      pad_top: 42
      pad_bottom: 5
      pad_left: 5
      pad_right: 5

      widgets:
        # ---------- LIGHTS ----------
        - button:
            id: living_light_btn
            checkable: true
            styles: control
            widgets:
              - label: { text: "Living" }
            on_click:
              - homeassistant.service:
                  service: light.toggle
                  data: { entity_id: light.living_room }

        - button:
            id: hall_light_btn
            checkable: true
            styles: control
            widgets:
              - label: { text: "Hall" }
            on_click:
              - homeassistant.service:
                  service: light.toggle
                  data: { entity_id: light.hall }

        - button:
            id: downstairs_light_btn
            checkable: true
            styles: control
            widgets:
              - label: { text: "Downstairs" }
            on_click:
              - homeassistant.service:
                  service: light.toggle
                  data: { entity_id: light.downstairs }

        - button:
            id: garden_light_btn
            checkable: true
            styles: control
            widgets:
              - label: { text: "Garden" }
            on_click:
              - homeassistant.service:
                  service: light.toggle
                  data: { entity_id: light.garden_lights }

        # ---------- THERMOSTATS (fixed-size, grid-friendly) ----------
        - button:
            styles: control
            width: 210
            height: 120
            widgets:
              - label:
                  text: "Living"
                  align: top_left

              - label:
                  id: living_target_label
                  align: center
                  text: "--.-°C"
                  text_font: clockbar_font

              - button:
                  width: 42
                  height: 34
                  align: bottom_left
                  x: 8
                  y: -8
                  radius: 6
                  widgets:
                    - label: { text: "-", align: center }
                  on_click:
                    - if:
                        condition:
                          lambda: 'return id(living_target_temp).has_state();'
                        then:
                          - homeassistant.service:
                              service: climate.set_temperature
                              data:
                                entity_id: climate.smart_radiator_thermostat_x
                                temperature: !lambda |-
                                  return id(living_target_temp).state - 0.5;

              - button:
                  width: 42
                  height: 34
                  align: bottom_right
                  x: -8
                  y: -8
                  radius: 6
                  widgets:
                    - label: { text: "+", align: center }
                  on_click:
                    - if:
                        condition:
                          lambda: 'return id(living_target_temp).has_state();'
                        then:
                          - homeassistant.service:
                              service: climate.set_temperature
                              data:
                                entity_id: climate.smart_radiator_thermostat_x
                                temperature: !lambda |-
                                  return id(living_target_temp).state + 0.5;

        - button:
            styles: control
            width: 210
            height: 120
            widgets:
              - label:
                  text: "House"
                  align: top_left

              - label:
                  id: house_target_label
                  align: center
                  text: "--.-°C"
                  text_font: clockbar_font

              - button:
                  width: 42
                  height: 34
                  align: bottom_left
                  x: 8
                  y: -8
                  radius: 6
                  widgets:
                    - label: { text: "-", align: center }
                  on_click:
                    - if:
                        condition:
                          lambda: 'return id(house_target_temp).has_state();'
                        then:
                          - homeassistant.service:
                              service: climate.set_temperature
                              data:
                                entity_id: climate.wireless_temperature_sensor_x
                                temperature: !lambda |-
                                  return id(house_target_temp).state - 0.5;

              - button:
                  width: 42
                  height: 34
                  align: bottom_right
                  x: -8
                  y: -8
                  radius: 6
                  widgets:
                    - label: { text: "+", align: center }
                  on_click:
                    - if:
                        condition:
                          lambda: 'return id(house_target_temp).has_state();'
                        then:
                          - homeassistant.service:
                              service: climate.set_temperature
                              data:
                                entity_id: climate.wireless_temperature_sensor_x
                                temperature: !lambda |-
                                  return id(house_target_temp).state + 0.5;

        # ---------- ENERGY ----------
        - button:
            styles: control
            widgets:
              - label: { text: "Solar" }
              - label:
                  id: solar_label
                  align: bottom_left
                  text: "-- kWh"

        - button:
            styles: control
            widgets:
              - label: { text: "Usage" }
              - label:
                  id: usage_label
                  align: bottom_left
                  text: "-- kWh"

        - button:
            styles: control
            widgets:
              - label: { text: "Car" }
              - label:
                  id: car_label
                  align: bottom_left
                  text: "--%"

        # ---------- WEATHER ----------
        - button:
            styles: control
            widgets:
              - label: { text: "Weather" }
              - label:
                  id: weather_label
                  align: bottom_left
                  text: "--"

        - button:
            styles: control
            widgets:
              - label: { text: "Rain" }
              - label:
                  id: rain_label
                  align: bottom_left
                  text: "--"
