lvgl:
  displays: my_display
  byte_order: little_endian

  top_layer:
    widgets:
      # Header temps (indoor / outdoor)
      - label:
          text: "-° / -°"
          id: temperatures
          text_font: clockbar_font
          align: top_left
          x: 8
          y: 8
          text_color: 0xFFFFFF

      # Header clock
      - label:
          text: "--:--"
          id: display_time
          text_font: clockbar_font
          align: top_mid
          x: 0
          y: 8
          text_align: center
          text_color: 0xFFFFFF

  pages:
    - id: main_page
      layout:
        type: flex
        flex_flow: row_wrap
        pad_row: 10
        pad_column: 10
      width: 100%
      bg_color: Black
      bg_opa: cover
      pad_top: 42
      pad_bottom: 5
      pad_left: 5
      pad_right: 5

      widgets:
        # ---------------- LIGHTS ----------------
        - button:
            id: living_light_btn
            checkable: true
            styles: control
            width: 240
            height: 120
            widgets:
              - label: { text_font: icon_font, text: $lightbulb, align: top_left }
              - label: { text: "Living", align: bottom_left }
            on_click:
              - homeassistant.service:
                  service: light.toggle
                  data: { entity_id: light.living_room }

        - button:
            id: hall_light_btn
            checkable: true
            styles: control
            width: 240
            height: 120
            widgets:
              - label: { text_font: icon_font, text: $lightbulb, align: top_left }
              - label: { text: "Hall", align: bottom_left }
            on_click:
              - homeassistant.service:
                  service: light.toggle
                  data: { entity_id: light.hall }

        - button:
            id: downstairs_light_btn
            checkable: true
            styles: control
            width: 240
            height: 120
            widgets:
              - label: { text_font: icon_font, text: $lightbulb, align: top_left }
              - label: { text: "Downstairs", align: bottom_left }
            on_click:
              - homeassistant.service:
                  service: light.toggle
                  data: { entity_id: light.downstairs }

        - button:
            id: garden_light_btn
            checkable: true
            styles: control
            width: 240
            height: 120
            widgets:
              - label: { text_font: icon_font, text: $lightbulb, align: top_left }
              - label: { text: "Garden", align: bottom_left }
            on_click:
              - homeassistant.service:
                  service: light.toggle
                  data: { entity_id: light.garden_lights }

        # ---------------- THERMOSTATS ----------------
        # Living (tile + +/- controls)
        - obj:
            styles: control
            width: 240
            height: 120
            pad_all: 0
            border_width: 0
            widgets:
              - label: { text_font: icon_font, text: $climate, align: top_left, x: 10, y: 8 }
              - label: { text: "Living", align: bottom_left, x: 10, y: -8 }

              - label:
                  id: living_target_label
                  text: "--.-°C"
                  text_font: clockbar_font
                  align: center

              - button:
                  width: 52
                  height: 52
                  align: top_right
                  x: -8
                  y: 8
                  widgets:
                    - label: { text: "+", text_font: label_font }
                  on_click:
                    - if:
                        condition:
                          lambda: return id(living_target_temp).has_state();
                        then:
                          - homeassistant.service:
                              service: climate.set_temperature
                              data:
                                entity_id: climate.smart_radiator_thermostat_x
                                temperature: !lambda |-
                                  return id(living_target_temp).state + 0.5;

              - button:
                  width: 52
                  height: 52
                  align: bottom_right
                  x: -8
                  y: -8
                  widgets:
                    - label: { text: "-", text_font: label_font }
                  on_click:
                    - if:
                        condition:
                          lambda: return id(living_target_temp).has_state();
                        then:
                          - homeassistant.service:
                              service: climate.set_temperature
                              data:
                                entity_id: climate.smart_radiator_thermostat_x
                                temperature: !lambda |-
                                  return id(living_target_temp).state - 0.5;

        # House (tile + +/- controls)
        - obj:
            styles: control
            width: 240
            height: 120
            pad_all: 0
            border_width: 0
            widgets:
              - label: { text_font: icon_font, text: $climate, align: top_left, x: 10, y: 8 }
              - label: { text: "House", align: bottom_left, x: 10, y: -8 }

              - label:
                  id: house_target_label
                  text: "--.-°C"
                  text_font: clockbar_font
                  align: center

              - button:
                  width: 52
                  height: 52
                  align: top_right
                  x: -8
                  y: 8
                  widgets:
                    - label: { text: "+", text_font: label_font }
                  on_click:
                    - if:
                        condition:
                          lambda: return id(house_target_temp).has_state();
                        then:
                          - homeassistant.service:
                              service: climate.set_temperature
                              data:
                                entity_id: climate.wireless_temperature_sensor_x
                                temperature: !lambda |-
                                  return id(house_target_temp).state + 0.5;

              - button:
                  width: 52
                  height: 52
                  align: bottom_right
                  x: -8
                  y: -8
                  widgets:
                    - label: { text: "-", text_font: label_font }
                  on_click:
                    - if:
                        condition:
                          lambda: return id(house_target_temp).has_state();
                        then:
                          - homeassistant.service:
                              service: climate.set_temperature
                              data:
                                entity_id: climate.wireless_temperature_sensor_x
                                temperature: !lambda |-
                                  return id(house_target_temp).state - 0.5;

        # ---------------- ENERGY ----------------
        - button:
            styles: control
            width: 240
            height: 120
            widgets:
              - label: { text_font: icon_font, text: $solar, align: top_left }
              - label: { text: "Solar", align: bottom_left }
              - label:
                  id: solar_label
                  text: "-- kWh"
                  align: bottom_right
                  x: -8
                  y: -8

        - button:
            styles: control
            width: 240
            height: 120
            widgets:
              - label: { text_font: icon_font, text: $energy, align: top_left }
              - label: { text: "Usage", align: bottom_left }
              - label:
                  id: usage_label
                  text: "-- kWh"
                  align: bottom_right
                  x: -8
                  y: -8

        - button:
            styles: control
            width: 240
            height: 120
            widgets:
              - label: { text_font: icon_font, text: $battery, align: top_left }
              - label: { text: "Car", align: bottom_left }
              - label:
                  id: car_label
                  text: "--%"
                  align: bottom_right
                  x: -8
                  y: -8

        # ---------------- WEATHER ----------------
        - button:
            styles: control
            width: 240
            height: 120
            widgets:
              - label:
                  id: weather_icon
                  text_font: icon_font
                  text: $weather_cloudy
                  align: top_left
              - label: { text: "Weather", align: bottom_left }
              - label:
                  id: weather_label
                  text: "--"
                  align: bottom_right
                  x: -8
                  y: -8

        - button:
            styles: control
            width: 240
            height: 120
            widgets:
              - label: { text_font: icon_font, text: $weather_rain, align: top_left }
              - label: { text: "Rain", align: bottom_left }
              - label:
                  id: rain_label
                  text: "--"
                  align: bottom_right
                  x: -8
                  y: -8

        # ---------------- SONOS / MEDIA ----------------
        - obj:
            styles: control
            width: 240
            height: 120
            pad_all: 0
            border_width: 0
            widgets:
              - label: { text_font: icon_font, text: $climate, align: top_left, x: 10, y: 8 }
              - label: { text: "Rowan room", align: bottom_left, x: 10, y: -8 }

              - label:
                  id: rowan_target_label
                  text: "--.-°C"
                  text_font: clockbar_font
                  align: center

              - button:
                  width: 52
                  height: 52
                  align: top_right
                  x: -8
                  y: 8
                  widgets:
                    - label: { text: "+", text_font: label_font }
                  on_click:
                    - if:
                        condition:
                          lambda: return id(rowan_target_temp).has_state();
                        then:
                          - homeassistant.service:
                              service: climate.set_temperature
                              data:
                                entity_id: climate.smart_radiator_thermostat_x_2
                                temperature: !lambda |-
                                  return id(rowan_target_temp).state + 0.5;

              - button:
                  width: 52
                  height: 52
                  align: bottom_right
                  x: -8
                  y: -8
                  widgets:
                    - label: { text: "-", text_font: label_font }
                  on_click:
                    - if:
                        condition:
                          lambda: return id(rowan_target_temp).has_state();
                        then:
                          - homeassistant.service:
                              service: climate.set_temperature
                              data:
                                entity_id: climate.smart_radiator_thermostat_x_2
                                temperature: !lambda |-
                                  return id(rowan_target_temp).state - 0.5;

        - obj:
            styles: control
            width: 240
            height: 120
            pad_all: 0
            border_width: 0
            widgets:
              - label: { text_font: icon_font, text: $climate, align: top_left, x: 10, y: 8 }
              - label: { text: "Maes", align: bottom_left, x: 10, y: -8 }

              - label:
                  id: maes_target_label
                  text: "--.-°C"
                  text_font: clockbar_font
                  align: center

              - button:
                  width: 52
                  height: 52
                  align: top_right
                  x: -8
                  y: 8
                  widgets:
                    - label: { text: "+", text_font: label_font }
                  on_click:
                    - if:
                        condition:
                          lambda: return id(maes_target_temp).has_state();
                        then:
                          - homeassistant.service:
                              service: climate.set_temperature
                              data:
                                entity_id: climate.smart_radiator_thermostat_x_3
                                temperature: !lambda |-
                                  return id(maes_target_temp).state + 0.5;

              - button:
                  width: 52
                  height: 52
                  align: bottom_right
                  x: -8
                  y: -8
                  widgets:
                    - label: { text: "-", text_font: label_font }
                  on_click:
                    - if:
                        condition:
                          lambda: return id(maes_target_temp).has_state();
                        then:
                          - homeassistant.service:
                              service: climate.set_temperature
                              data:
                                entity_id: climate.smart_radiator_thermostat_x_3
                                temperature: !lambda |-
                                  return id(maes_target_temp).state - 0.5;

        - button:
            styles: control
            width: 240
            height: 120
            widgets:
              - label: { text: "Now", align: bottom_left }
              - label:
                  id: now_playing_label
                  text: "--"
                  align: center
                  long_mode: scroll_circular
                  width: 220

        - button:
            styles: control
            width: 240
            height: 120
            widgets:
              - label: { text_font: icon_font, text: $playpause, align: top_left }
              - label:
                  id: play_state_label
                  text: "Play/Pause"
                  align: bottom_left
            on_click:
              - homeassistant.service:
                  service: media_player.media_play_pause
                  data:
                    entity_id: media_player.kitchen

        # Volume tile + +/- controls
        - obj:
            styles: control
            width: 240
            height: 120
            pad_all: 0
            border_width: 0
            widgets:
              - label: { text_font: icon_font, text: $volume, align: top_left, x: 10, y: 8 }
              - label: { text: "Vol", align: bottom_left, x: 10, y: -8 }

              - label:
                  id: volume_label
                  text: "--%"
                  align: center
                  text_font: clockbar_font

              - button:
                  width: 52
                  height: 52
                  align: top_right
                  x: -8
                  y: 8
                  widgets:
                    - label: { text: "+", text_font: label_font }
                  on_click:
                    - homeassistant.service:
                        service: media_player.volume_up
                        data:
                          entity_id: media_player.kitchen

              - button:
                  width: 52
                  height: 52
                  align: bottom_right
                  x: -8
                  y: -8
                  widgets:
                    - label: { text: "-", text_font: label_font }
                  on_click:
                    - homeassistant.service:
                        service: media_player.volume_down
                        data:
                          entity_id: media_player.kitchen
