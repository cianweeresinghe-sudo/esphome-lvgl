lvgl:
  displays: my_display
  byte_order: little_endian

##################################################
# TOP BAR
##################################################

  top_layer:
    widgets:

      - label:
          id: temperatures
          text: "--° / --°"
          align: top_left
          x: 8
          y: 8
          text_color: 0xFFFFFF

      - label:
          id: display_time
          text: "--:--"
          align: top_mid
          y: 8
          text_color: 0xFFFFFF


##################################################
# MAIN PAGE
##################################################

  pages:

    - id: home_summary_page
      layout:
        type: flex
        flex_flow: column_wrap
        pad_row: 10
        pad_column: 10
      width: 100%
      bg_color: Black
      pad_top: 42

      widgets:

        ##################################################
        # LIGHTS
        ##################################################

        - button:
            id: living_light_btn
            checkable: true
            styles: control
            widgets:
              - label: { text: "Living" }
            on_click:
              - homeassistant.service:
                  service: light.toggle
                  data: { entity_id: light.living_room }

        - button:
            id: hall_light_btn
            checkable: true
            styles: control
            widgets:
              - label: { text: "Hall" }
            on_click:
              - homeassistant.service:
                  service: light.toggle
                  data: { entity_id: light.hall }

        - button:
            id: downstairs_light_btn
            checkable: true
            styles: control
            widgets:
              - label: { text: "Downstairs" }
            on_click:
              - homeassistant.service:
                  service: light.toggle
                  data: { entity_id: light.downstairs }

        - button:
            id: garden_light_btn
            checkable: true
            styles: control
            widgets:
              - label: { text: "Garden" }
            on_click:
              - homeassistant.service:
                  service: light.toggle
                  data: { entity_id: light.garden_lights }


        ##################################################
        # ENERGY
        ##################################################

        - button:
            styles: control
            widgets:
              - label: { text: "Solar" }
              - label:
                  id: solar_label
                  align: bottom_left
                  text: "-- kWh"

        - button:
            styles: control
            widgets:
              - label: { text: "Usage" }
              - label:
                  id: usage_label
                  align: bottom_left
                  text: "-- kWh"

        - button:
            styles: control
            widgets:
              - label: { text: "Car" }
              - label:
                  id: car_label
                  align: bottom_left
                  text: "--%"


        ##################################################
        # WEATHER (ICON + TEXT)
        ##################################################

        - button:
            styles: control
            widgets:
              - label:
                  id: weather_icon
                  text_font: icon_font
                  text: "\uF059"
              - label:
                  id: weather_label
                  align: bottom_left
                  text: "--"


        ##################################################
        # SONOS
        ##################################################

        - button:
            styles: control
            widgets:
              - label: { text: "Radio 1" }
            on_click:
              - homeassistant.service:
                  service: script.sonos_favourite_radio_1

        - button:
            styles: control
            widgets:
              - label: { text: "Radio 2" }
            on_click:
              - homeassistant.service:
                  service: script.sonos_favourite_radio_2
