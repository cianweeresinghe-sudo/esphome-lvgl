sensor:

  # ---------------- TEMPERATURES ----------------
  - platform: homeassistant
    id: living_temp
    entity_id: climate.smart_radiator_thermostat_x
    attribute: current_temperature
    on_value:
      - lvgl.label.update:
          id: living_temp_label
          text:
            format: "%.1f°C"
            args: [ 'x' ]

  - platform: homeassistant
    id: house_temp
    entity_id: climate.wireless_temperature_sensor_x
    attribute: current_temperature
    on_value:
      - lvgl.label.update:
          id: house_temp_label
          text:
            format: "%.1f°C"
            args: [ 'x' ]


  # ---------------- ENERGY ----------------
  - platform: homeassistant
    id: solar_today
    entity_id: sensor.solar_daily_production_kwh
    on_value:
      - lvgl.label.update:
          id: solar_label
          text:
            format: "%.1f kWh"
            args: [ 'x' ]

  - platform: homeassistant
    id: usage_today
    entity_id: sensor.envoy_122429013109_energy_consumption_today
    on_value:
      - lvgl.label.update:
          id: usage_label
          text:
            format: "%.1f kWh"
            args: [ 'x' ]

  - platform: homeassistant
    id: car_battery
    entity_id: sensor.ky22mdv_battery
    on_value:
      - lvgl.label.update:
          id: car_label
          text:
            format: "%.0f%%"
            args: [ 'x' ]


# ---------------- TEXT ----------------
text_sensor:

  - platform: homeassistant
    id: rain_status_text
    entity_id: sensor.rain_status_text
    on_value:
      - lvgl.label.update:
          id: rain_label
          text: !lambda return x;

  - platform: homeassistant
    id: weather_condition
    entity_id: weather.forecast_home
    attribute: condition
    on_value:
      - lvgl.label.update:
          id: weather_label
          text: !lambda return x;


# ---------------- LIGHT STATES ----------------
binary_sensor:

  - platform: homeassistant
    id: living_room_light_state
    entity_id: light.living_room
    trigger_on_initial_state: true
    on_state:
      - lvgl.widget.update:
          id: living_light_btn
          state:
            checked: !lambda return x;

  - platform: homeassistant
    id: hall_light_state
    entity_id: light.hall
    trigger_on_initial_state: true
    on_state:
      - lvgl.widget.update:
          id: hall_light_btn
          state:
            checked: !lambda return x;

  - platform: homeassistant
    id: downstairs_light_state
    entity_id: light.downstairs
    trigger_on_initial_state: true
    on_state:
      - lvgl.widget.update:
          id: downstairs_light_btn
          state:
            checked: !lambda return x;

  - platform: homeassistant
    id: garden_light_state
    entity_id: light.garden_lights
    trigger_on_initial_state: true
    on_state:
      - lvgl.widget.update:
          id: garden_light_btn
          state:
            checked: !lambda return x;
