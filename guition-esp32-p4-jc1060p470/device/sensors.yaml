binary_sensor:

  - platform: homeassistant
    entity_id: light.kitchen
    trigger_on_initial_state: true
    on_state:
      - lvgl.widget.update:
          id: kitchen_btn
          state:
            checked: !lambda return x;

  - platform: homeassistant
    entity_id: light.living_room
    trigger_on_initial_state: true
    on_state:
      - lvgl.widget.update:
          id: living_btn
          state:
            checked: !lambda return x;

  - platform: homeassistant
    entity_id: light.hall
    trigger_on_initial_state: true
    on_state:
      - lvgl.widget.update:
          id: hall_btn
          state:
            checked: !lambda return x;

  - platform: homeassistant
    entity_id: light.downstairs
    trigger_on_initial_state: true
    on_state:
      - lvgl.widget.update:
          id: downstairs_btn
          state:
            checked: !lambda return x;

  - platform: homeassistant
    entity_id: light.garden_lights
    trigger_on_initial_state: true
    on_state:
      - lvgl.widget.update:
          id: garden_btn
          state:
            checked: !lambda return x;
