sensor:
  # -------- Header temperatures --------
  - platform: homeassistant
    id: header_indoor_temp
    entity_id: sensor.family_s_echo_temperature
    on_value:
      - lvgl.label.update:
          id: temperatures
          text: !lambda |-
            if (!id(header_indoor_temp).has_state() || !id(header_outdoor_temp).has_state()) {
              return std::string("-° / -°");
            }
            char buf[32];
            snprintf(buf, sizeof(buf), "%d° / %d°",
                     (int) round(id(header_indoor_temp).state),
                     (int) round(id(header_outdoor_temp).state));
            return std::string(buf);

  - platform: homeassistant
    id: header_outdoor_temp
    entity_id: weather.forecast_home
    attribute: temperature
    on_value:
      - lvgl.label.update:
          id: temperatures
          text: !lambda |-
            if (!id(header_indoor_temp).has_state() || !id(header_outdoor_temp).has_state()) {
              return std::string("-° / -°");
            }
            char buf[32];
            snprintf(buf, sizeof(buf), "%d° / %d°",
                     (int) round(id(header_indoor_temp).state),
                     (int) round(id(header_outdoor_temp).state));
            return std::string(buf);

  # -------- Thermostat setpoints --------
  - platform: homeassistant
    id: living_target_temp
    entity_id: climate.smart_radiator_thermostat_x
    attribute: temperature
    on_value:
      - lvgl.label.update:
          id: living_target_label
          text:
            format: "%.1f°C"
            args: ["x"]

  - platform: homeassistant
    id: house_target_temp
    entity_id: climate.wireless_temperature_sensor_x
    attribute: temperature
    on_value:
      - lvgl.label.update:
          id: house_target_label
          text:
            format: "%.1f°C"
            args: ["x"]

  - platform: homeassistant
    id: rowan_target_temp
    entity_id: climate.smart_radiator_thermostat_x_2
    attribute: temperature
    on_value:
      - lvgl.label.update:
          id: rowan_target_label
          text:
            format: "%.1f°C"
            args: ["x"]

  - platform: homeassistant
    id: maes_target_temp
    entity_id: climate.smart_radiator_thermostat_x_3
    attribute: temperature
    on_value:
      - lvgl.label.update:
          id: maes_target_label
          text:
            format: "%.1f°C"
            args: ["x"]

  # -------- Energy / car --------
  - platform: homeassistant
    id: solar_today
    entity_id: sensor.solar_daily_production_kwh
    on_value:
      - lvgl.label.update:
          id: solar_label
          text:
            format: "%.1f kWh"
            args: ["x"]

  - platform: homeassistant
    id: usage_today
    entity_id: sensor.envoy_122429013109_energy_consumption_today
    on_value:
      - lvgl.label.update:
          id: usage_label
          text:
            format: "%.1f kWh"
            args: ["x"]

  - platform: homeassistant
    id: car_battery
    entity_id: sensor.ky22mdv_battery
    on_value:
      - lvgl.label.update:
          id: car_label
          text:
            format: "%.0f%%"
            args: ["x"]

  # -------- Sonos volume (0.0..1.0) --------
  - platform: homeassistant
    id: kitchen_volume
    entity_id: media_player.kitchen
    attribute: volume_level
    on_value:
      - lvgl.label.update:
          id: volume_label
          text: !lambda |-
            int pct = (int) round(x * 100.0f);
            char buf[8];
            snprintf(buf, sizeof(buf), "%d%%", pct);
            return std::string(buf);


text_sensor:
  # -------- Weather condition (entity state) --------
  - platform: homeassistant
    id: weather_condition
    entity_id: weather.forecast_home
    on_value:
      - lvgl.label.update:
          id: weather_label
          text: !lambda |-
            return x;

      # Update icon glyph dynamically (unicode strings at runtime)
      - lvgl.label.update:
          id: weather_icon
          text: !lambda |-
            // F0590 sunny, F0595 cloudy, F0597 rainy
            if (x == "sunny") return std::string("\U000F0590");
            if (x == "cloudy" || x == "partlycloudy") return std::string("\U000F0595");
            if (x == "rainy" || x == "pouring" || x == "lightning-rainy") return std::string("\U000F0597");
            return std::string("\U000F0595");

  # -------- Rain status text --------
  - platform: homeassistant
    id: rain_status
    entity_id: sensor.rain_status_text
    on_value:
      - lvgl.label.update:
          id: rain_label
          text: !lambda |-
            std::string s = x;
            // Your sensor sometimes contains ">" and whitespace
            s.erase(std::remove(s.begin(), s.end(), '>'), s.end());
            while (!s.empty() && (s.front() == ' ' || s.front() == '\n' || s.front() == '\r' || s.front() == '\t')) s.erase(s.begin());
            while (!s.empty() && (s.back()  == ' ' || s.back()  == '\n' || s.back()  == '\r' || s.back()  == '\t')) s.pop_back();
            if (s.empty()) s = "--";
            return s;

  # -------- Media player state --------
  - platform: homeassistant
    id: kitchen_player_state
    entity_id: media_player.kitchen
    on_value:
      - lvgl.label.update:
          id: play_state_label
          text: !lambda |-
            if (x == "playing") return std::string("Playing");
            if (x == "paused")  return std::string("Paused");
            if (x == "idle")    return std::string("Idle");
            if (x == "off")     return std::string("Off");
            return std::string("Play/Pause");

  # -------- Now playing (title + artist) --------
  - platform: homeassistant
    id: kitchen_media_artist
    entity_id: media_player.kitchen
    attribute: media_artist
    on_value:
      - lvgl.label.update:
          id: now_playing_label
          text: !lambda |-
            std::string t = id(kitchen_media_title).has_state() ? id(kitchen_media_title).state : "";
            std::string a = x;
            std::string s = t;
            if (!a.empty()) {
              if (!s.empty()) s += " · ";
              s += a;
            }
            if (s.empty()) s = "--";
            if (s.size() > 28) s = s.substr(0, 28) + "…";
            return s;

  - platform: homeassistant
    id: kitchen_media_title
    entity_id: media_player.kitchen
    attribute: media_title
    on_value:
      - lvgl.label.update:
          id: now_playing_label
          text: !lambda |-
            std::string t = x;
            std::string a = id(kitchen_media_artist).has_state() ? id(kitchen_media_artist).state : "";
            std::string s = t;
            if (!a.empty()) {
              if (!s.empty()) s += " · ";
              s += a;
            }
            if (s.empty()) s = "--";
            if (s.size() > 28) s = s.substr(0, 28) + "…";
            return s;


