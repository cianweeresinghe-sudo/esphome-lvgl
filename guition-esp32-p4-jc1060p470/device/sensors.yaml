lvgl:
  displays: my_display
  byte_order: little_endian

##################################################
# TOP BAR (required by package)
##################################################

  top_layer:
    widgets:

      - label:
          id: temperatures
          text: "--° / --°"
          align: top_left
          x: 8
          y: 8

      - label:
          id: display_time
          text: "--:--"
          align: top_mid
          y: 8


##################################################
# MAIN PAGE
##################################################

  pages:
    - id: home_summary_page
      layout:
        type: flex
        flex_flow: column_wrap
        pad_row: 10
        pad_column: 10
      width: 100%
      bg_color: Black
      pad_top: 42

      widgets:

        ##################################################
        # THERMOSTATS (CONTROL)
        ##################################################

        - button:
            styles: control
            widgets:
              - label: { text: "Living" }

              - label:
                  id: living_target_label
                  align: center
                  text: "--.-°C"

              - button:
                  width: 60
                  height: 50
                  align: bottom_left
                  widgets:
                    - label: { text: "-" }
                  on_click:
                    - homeassistant.service:
                        service: climate.set_temperature
                        data:
                          entity_id: climate.smart_radiator_thermostat_x
                          temperature: !lambda return id(living_target_temp).state - 0.5;

              - button:
                  width: 60
                  height: 50
                  align: bottom_right
                  widgets:
                    - label: { text: "+" }
                  on_click:
                    - homeassistant.service:
                        service: climate.set_temperature
                        data:
                          entity_id: climate.smart_radiator_thermostat_x
                          temperature: !lambda return id(living_target_temp).state + 0.5;


        - button:
            styles: control
            widgets:
              - label: { text: "House" }

              - label:
                  id: house_target_label
                  align: center
                  text: "--.-°C"

              - button:
                  width: 60
                  height: 50
                  align: bottom_left
                  widgets:
                    - label: { text: "-" }
                  on_click:
                    - homeassistant.service:
                        service: climate.set_temperature
                        data:
                          entity_id: climate.wireless_temperature_sensor_x
                          temperature: !lambda return id(house_target_temp).state - 0.5;

              - button:
                  width: 60
                  height: 50
                  align: bottom_right
                  widgets:
                    - label: { text: "+" }
                  on_click:
                    - homeassistant.service:
                        service: climate.set_temperature
                        data:
                          entity_id: climate.wireless_temperature_sensor_x
                          temperature: !lambda return id(house_target_temp).state + 0.5;


        ##################################################
        # ENERGY
        ##################################################

        - button:
            styles: control
            widgets:
              - label: { text: "Solar" }
              - label:
                  id: solar_label
                  align: bottom_left
                  text: "-- kWh"

        - button:
            styles: control
            widgets:
              - label: { text: "Usage" }
              - label:
                  id: usage_label
                  align: bottom_left
                  text: "-- kWh"

        - button:
            styles: control
            widgets:
              - label: { text: "Car" }
              - label:
                  id: car_label
                  align: bottom_left
                  text: "--%"


        ##################################################
        # WEATHER + RAIN
        ##################################################

        - button:
            styles: control
            widgets:
              - label:
                  id: weather_icon
                  text_font: $icon_font
                  text: "\uF059"

              - label:
                  id: weather_label
                  align: bottom_left
                  text: "--"

        - button:
            styles: control
            widgets:
              - label: { text: "Rain" }
              - label:
                  id: rain_label
                  align: bottom_left
                  text: "--"
