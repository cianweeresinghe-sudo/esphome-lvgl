# Home Assistant sensors & bindings for the LVGL UI (no custom scripts)

sensor:
  # --- Header: Indoor temperature (kitchen Echo) ---
  - platform: homeassistant
    id: header_indoor_temp
    entity_id: sensor.family_s_echo_temperature
    on_value:
      - lvgl.label.update:
          id: temperatures
          text: !lambda |-
            if (!id(header_indoor_temp).has_state() || !id(header_outdoor_temp).has_state()) {
              return std::string("-° / -°");
            }
            char buf[32];
            snprintf(buf, sizeof(buf), "%d° / %d°",
                     (int) round(id(header_indoor_temp).state),
                     (int) round(id(header_outdoor_temp).state));
            return std::string(buf);

  # --- Header: Outdoor temperature from weather entity attribute ---
  - platform: homeassistant
    id: header_outdoor_temp
    entity_id: weather.forecast_home
    attribute: temperature
    on_value:
      - lvgl.label.update:
          id: temperatures
          text: !lambda |-
            if (!id(header_indoor_temp).has_state() || !id(header_outdoor_temp).has_state()) {
              return std::string("-° / -°");
            }
            char buf[32];
            snprintf(buf, sizeof(buf), "%d° / %d°",
                     (int) round(id(header_indoor_temp).state),
                     (int) round(id(header_outdoor_temp).state));
            return std::string(buf);

  # --- Thermostat targets (Tado) ---
  - platform: homeassistant
    id: living_target_temp
    entity_id: climate.smart_radiator_thermostat_x
    attribute: temperature
    on_value:
      - lvgl.label.update:
          id: living_target_label
          text:
            format: "%.1f°C"
            args: ["x"]

  - platform: homeassistant
    id: house_target_temp
    entity_id: climate.wireless_temperature_sensor_x
    attribute: temperature
    on_value:
      - lvgl.label.update:
          id: house_target_label
          text:
            format: "%.1f°C"
            args: ["x"]

  # --- Energy / car ---
  - platform: homeassistant
    id: solar_today
    entity_id: sensor.solar_daily_production_kwh
    on_value:
      - lvgl.label.update:
          id: solar_label
          text:
            format: "%.1f kWh"
            args: ["x"]

  - platform: homeassistant
    id: usage_today
    entity_id: sensor.envoy_122429013109_energy_consumption_today
    on_value:
      - lvgl.label.update:
          id: usage_label
          text:
            format: "%.1f kWh"
            args: ["x"]

  - platform: homeassistant
    id: car_battery
    entity_id: sensor.ky22mdv_battery
    on_value:
      - lvgl.label.update:
          id: car_label
          text:
            format: "%.0f%%"
            args: ["x"]


text_sensor:
  # --- Weather condition (state of weather entity) ---
  - platform: homeassistant
    id: weather_condition
    entity_id: weather.forecast_home
    on_value:
      - lvgl.label.update:
          id: weather_label
          text: !lambda |-
            return x;

  # --- Rain status text ---
  - platform: homeassistant
    id: rain_status
    entity_id: sensor.rain_status_text
    on_value:
      - lvgl.label.update:
          id: rain_label
          text: !lambda |-
            // Your sensor is coming through with extra whitespace / '>' line breaks.
            std::string s = x;
            // Remove '>' characters
            s.erase(std::remove(s.begin(), s.end(), '>'), s.end());
            // Trim leading whitespace/newlines
            while (!s.empty() && (s.front() == ' ' || s.front() == '\n' || s.front() == '\r' || s.front() == '\t')) s.erase(s.begin());
            // Trim trailing whitespace/newlines
            while (!s.empty() && (s.back() == ' ' || s.back() == '\n' || s.back() == '\r' || s.back() == '\t')) s.pop_back();
            return s;


binary_sensor:
  # --- Light button checked states (match your working approach) ---
  - platform: homeassistant
    id: living_light_state
    entity_id: light.living_room
    trigger_on_initial_state: true
    on_state:
      then:
        - lvgl.widget.update:
            id: living_light_btn
            state:
              checked: !lambda return x;

  - platform: homeassistant
    id: hall_light_state
    entity_id: light.hall
    trigger_on_initial_state: true
    on_state:
      then:
        - lvgl.widget.update:
            id: hall_light_btn
            state:
              checked: !lambda return x;

  - platform: homeassistant
    id: downstairs_light_state
    entity_id: light.downstairs
    trigger_on_initial_state: true
    on_state:
      then:
        - lvgl.widget.update:
            id: downstairs_light_btn
            state:
              checked: !lambda return x;

  - platform: homeassistant
    id: garden_light_state
    entity_id: light.garden_lights
    trigger_on_initial_state: true
    on_state:
      then:
        - lvgl.widget.update:
            id: garden_light_btn
            state:
              checked: !lambda return x;
