binary_sensor:

  - platform: homeassistant
    id: kitchen_light_state
    entity_id: light.kitchen
    trigger_on_initial_state: true
    on_state:
      - lvgl.widget.update:
          id: kitchen_btn
          state:
            checked: !lambda return x;

  - platform: homeassistant
    id: living_light_state
    entity_id: light.living_room
    trigger_on_initial_state: true
    on_state:
      - lvgl.widget.update:
          id: living_btn
          state:
            checked: !lambda return x;
