##################################################
# HOME ASSISTANT SENSORS
##################################################

sensor:

  # ---------- HEADER TEMPS ----------
  - platform: homeassistant
    id: header_indoor_temp
    entity_id: sensor.family_s_echo_temperature
    on_value:
      - script.execute: update_header_temp

  - platform: homeassistant
    id: header_outdoor_temp
    entity_id: weather.forecast_home
    attribute: temperature
    on_value:
      - script.execute: update_header_temp


  # ---------- TADO TARGET TEMPS ----------
  - platform: homeassistant
    id: living_target_temp
    entity_id: climate.smart_radiator_thermostat_x
    attribute: temperature
    on_value:
      - lvgl.label.update:
          id: living_target_label
          text:
            format: "%.1f°C"
            args: [ 'x' ]

  - platform: homeassistant
    id: house_target_temp
    entity_id: climate.wireless_temperature_sensor_x
    attribute: temperature
    on_value:
      - lvgl.label.update:
          id: house_target_label
          text:
            format: "%.1f°C"
            args: [ 'x' ]


  # ---------- ENERGY ----------
  - platform: homeassistant
    id: solar_today
    entity_id: sensor.solar_daily_production_kwh
    on_value:
      - lvgl.label.update:
          id: solar_label
          text:
            format: "%.1f kWh"
            args: [ 'x' ]

  - platform: homeassistant
    id: usage_today
    entity_id: sensor.envoy_122429013109_energy_consumption_today
    on_value:
      - lvgl.label.update:
          id: usage_label
          text:
            format: "%.1f kWh"
            args: [ 'x' ]

  - platform: homeassistant
    id: car_battery
    entity_id: sensor.ky22mdv_battery
    on_value:
      - lvgl.label.update:
          id: car_label
          text:
            format: "%.0f%%"
            args: [ 'x' ]


##################################################
# TEXT SENSORS
##################################################

text_sensor:
  - platform: homeassistant
    id: weather_condition
    entity_id: weather.forecast_home
    on_value:
      - script.execute: update_weather_ui

  - platform: homeassistant
    id: rain_status
    entity_id: sensor.rain_status_text
    on_value:
      - lvgl.label.update:
          id: rain_label
          text: !lambda return x;


##################################################
# LIGHT STATE SYNC (RESTORED)
##################################################

binary_sensor:

  - platform: homeassistant
    id: living_light_state
    entity_id: light.living_room
    on_state:
      - lvgl.widget.update:
          id: living_light_btn
          state:
            checked: !lambda return x;

  - platform: homeassistant
    id: hall_light_state
    entity_id: light.hall
    on_state:
      - lvgl.widget.update:
          id: hall_light_btn
          state:
            checked: !lambda return x;

  - platform: homeassistant
    id: downstairs_light_state
    entity_id: light.downstairs
    on_state:
      - lvgl.widget.update:
          id: downstairs_light_btn
          state:
            checked: !lambda return x;

  - platform: homeassistant
    id: garden_light_state
    entity_id: light.garden_lights
    on_state:
      - lvgl.widget.update:
          id: garden_light_btn
          state:
            checked: !lambda return x;


##################################################
# SCRIPTS
##################################################
time:
  - platform: sntp
    id: sntp_time
    
script:
  - id: update_header_temp
    then:
      - lambda: |-
          if (!id(header_indoor_temp).has_state() || !id(header_outdoor_temp).has_state()) return;
          char buf[32];
          snprintf(buf, sizeof(buf), "%d° / %d°",
                   (int) round(id(header_indoor_temp).state),
                   (int) round(id(header_outdoor_temp).state));
          lv_label_set_text(id(temperatures), buf);

  - id: update_weather_ui
    then:
      - lambda: |-
          if (!id(weather_condition).has_state()) return;
          lv_label_set_text(id(weather_label), id(weather_condition).state.c_str());
