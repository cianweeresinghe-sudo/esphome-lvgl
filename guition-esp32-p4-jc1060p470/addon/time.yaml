# Snmp Time
time:
  - platform: sntp
    id: sntp_time
    timezone: Europe/London
    servers:
     - 0.pool.ntp.org
     - 1.pool.ntp.org
     - 2.pool.ntp.org
    on_time_sync:
      - script.execute: time_update
      - script.execute: screen_apply_idle_level

    on_time:
      # ---- CLOCK UPDATE ----
      - seconds: 0
        minutes: /1
        then:
          - script.execute: time_update

      # ---- NIGHT MODE ON (23:00) ----
      - seconds: 0
        minutes: 0
        hours: 23
        then:
          - script.execute: screen_night_mode

      # ---- DAY MODE ON (06:00) ----
      - seconds: 0
        minutes: 0
        hours: 6
        then:
          - script.execute: screen_day_mode


# Clock
script:
  - id: time_update
    then:
      - lvgl.label.update:
          id: display_time
          text: !lambda |-
            static char time_buf[17];
            auto now = id(sntp_time).now();
            snprintf(time_buf, sizeof(time_buf), "%02d:%02d", now.hour, now.minute);
            return time_buf;
