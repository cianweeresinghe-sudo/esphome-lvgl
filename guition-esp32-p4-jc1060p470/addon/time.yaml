time:
  - platform: sntp
    id: sntp_time
    timezone: "GMT0BST,M3.5.0/1,M10.5.0"

    servers:
      - 0.pool.ntp.org
      - 1.pool.ntp.org
      - 2.pool.ntp.org

    # When time becomes valid after boot
    on_time_sync:
      then:
        - script.execute: time_update

    # Update header clock every minute
    on_time:
      - seconds: 0
        minutes: /1
        then:
          - script.execute: time_update


# ------------------------------------------------
# CLOCK UPDATE SCRIPT (ONLY CLOCK NOW)
# ------------------------------------------------
script:
  - id: time_update
    then:
      - lvgl.label.update:
          id: display_time
          text: !lambda |-
            static char time_buf[17];
            auto now = id(sntp_time).now();
            if (!now.is_valid()) return std::string("--:--");
            snprintf(time_buf, sizeof(time_buf), "%02d:%02d", now.hour, now.minute);
            return std::string(time_buf);
